<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>bmonster schedule</title>
<style>
body{margin:0;background:#f2f2f2;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;color:#111}
header{position:sticky;top:0;background:#fff;z-index:20;border-bottom:1px solid #ddd}
.top{height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 14px}
.logo{font-weight:900;line-height:1;font-size:17px}.logo small{font-size:8px}
.title{font-weight:800;font-size:18px}.icons{font-size:20px;display:flex;gap:12px}
.datebar{display:flex;gap:8px;overflow:auto;padding:10px 12px;background:#fff}
.datebtn{border:1px solid #ddd;background:#fff;border-radius:7px;padding:9px 16px;white-space:nowrap;font-size:14px}
.datebtn.active{background:#e95524;color:#fff;border-color:#e95524}
.search{padding:10px 12px;background:#fff}
input{width:100%;box-sizing:border-box;border:1px solid #ddd;border-radius:10px;padding:12px;font-size:16px}
.wrap{overflow:auto}
.studioHead{display:grid;grid-template-columns:62px repeat(4,145px);position:sticky;top:128px;z-index:10;min-width:642px}
.corner{background:#eee}.studio{padding:13px 4px;text-align:center;color:#fff;font-weight:900;font-size:12px;letter-spacing:.5px}
.ginza{background:#2b2b2b}.omote{background:#777}.shinjuku{background:#54b8ee}.ike{background:#e76682}
.table{display:grid;grid-template-columns:62px repeat(4,145px);min-width:642px}
.time{background:#fff;border-right:1px solid #ddd;border-bottom:1px solid #ddd;text-align:center;font-weight:800;font-size:14px;padding-top:34px}
.cell{border-right:1px solid #ddd;border-bottom:1px solid #ddd;padding:6px;background:#f7f7f7;min-height:118px}
.card{background:#fff;border:1px solid #ddd;border-radius:8px;min-height:105px;text-align:center;padding:8px 4px;box-shadow:0 1px 2px rgba(0,0,0,.05)}
.classTime{font-size:13px;margin-bottom:6px}.performer{font-weight:900;font-size:18px;letter-spacing:1px;margin-bottom:6px}
.program{font-size:14px;margin-bottom:8px}.difficulty{font-size:12px;border-top:1px solid #eee;padding-top:6px}
.badge{display:inline-block;font-size:10px;color:#fff;border-radius:3px;padding:2px 5px;margin-left:4px;background:#777}
.full{background:#222}.event{background:#e95524}.lite{background:#77aeca;color:#fff;padding:4px 8px;border-radius:2px}
.empty{opacity:.2;display:flex;align-items:center;justify-content:center}
.note{padding:10px 12px;font-size:12px;color:#666}
</style>
</head>
<body>
<header>
  <div class="top">
    <div class="logo">b-monster<br><small>FITNESS STUDIO</small></div>
    <div class="title">4スタジオ早見表</div>
    <div class="icons">🔍 ⭐ ☰</div>
  </div>
  <div class="datebar" id="datebar"></div>
  <div class="search"><input id="q" placeholder="パフォーマー・プログラム検索"></div>
</header>

<div class="wrap">
  <div class="studioHead">
    <div class="corner"></div>
    <div class="studio ginza">GINZA</div>
    <div class="studio omote">OMOTESANDO</div>
    <div class="studio shinjuku">SHINJUKU</div>
    <div class="studio ike">IKEBUKURO</div>
  </div>
  <main class="table" id="table"></main>
</div>
<div class="note">※カードをタップすると公式予約ページを開きます。現在はデモ版です。</div>

<script>
const studios=["GINZA","OMOTESANDO","SHINJUKU","IKEBUKURO"];
const dates=["6/30（火）","7/1（水）","7/2（木）","7/3（金）","7/4（土）","7/5（日）","7/6（月）"];
let currentDate="7/1（水）";

const lessons=[
["7/1（水）","6:50","7:45","GINZA","ASAMI","MIX1",3,"FULL"],
["7/1（水）","6:50","7:45","OMOTESANDO","ACE","EDM0",1,""],
["7/1（水）","6:50","7:45","SHINJUKU","JELLENA","K-POP3",2,""],
["7/1（水）","6:50","7:45","IKEBUKURO","Kirara","MIX2",1,""],
["7/1（水）","8:10","9:05","GINZA","SALLY","POPS0",1,""],
["7/1（水）","8:10","9:05","OMOTESANDO","SALLY","POPS0",1,""],
["7/1（水）","8:10","9:05","SHINJUKU","JELLENA","K-POP3",2,""],
["7/1（水）","8:10","9:05","IKEBUKURO","JOANA","LATIN2",3,""],
["7/1（水）","9:30","10:25","GINZA","RR!","Gryffin",2,""],
["7/1（水）","9:30","10:25","OMOTESANDO","RIO","MIX3",3,""],
["7/1（水）","9:30","10:25","SHINJUKU","SALLY","MIX1",2,""],
["7/1（水）","9:30","10:25","IKEBUKURO","RIO","ASIA",2,"EVENT"],
["7/1（水）","10:50","11:45","GINZA","Chad","ROCK1",2,""],
["7/1（水）","10:50","11:45","OMOTESANDO","ASAMI","EDM1",3,""],
["7/1（水）","10:50","11:45","SHINJUKU","ACE","MIX1",2,""],
["7/1（水）","10:50","11:45","IKEBUKURO","JELLENA","K-POP1",2,""],
["7/1（水）","12:10","13:05","GINZA","ULU","HIPHOP0",1,""],
["7/1（水）","12:10","13:05","OMOTESANDO","SALLY","Lite Program",0,"LITE"],
["7/1（水）","12:10","13:05","SHINJUKU","JELLENA","K-POP1",1,""],
["7/1（水）","12:10","13:05","IKEBUKURO","KAORI","MIX1",1,""],
["7/1（水）","13:30","14:25","GINZA","SALLY","POPS0",1,""],
["7/1（水）","13:30","14:25","OMOTESANDO","RIO","MIX3",3,""],
["7/1（水）","13:30","14:25","SHINJUKU","RR!","Gryffin",2,""],
["7/1（水）","13:30","14:25","IKEBUKURO","ULU","EDM1",2,""],
["7/1（水）","14:50","15:45","GINZA","ULU","OCEANIA",2,"EVENT"],
["7/1（水）","14:50","15:45","OMOTESANDO","ACE","MIX2",3,""],
["7/1（水）","14:50","15:45","SHINJUKU","YUUHI","MIX2",3,""],
["7/1（水）","14:50","15:45","IKEBUKURO","RR!","COUNTRY1",3,""],
["7/1（水）","16:10","17:05","GINZA","RR!","Mobility1",2,""],
["7/1（水）","16:10","17:05","OMOTESANDO","ASAMI","MIX1",2,""],
["7/1（水）","16:10","17:05","SHINJUKU","Kirara","MIX4",2,""],
["7/1（水）","16:10","17:05","IKEBUKURO","SALLY","EUROPE",2,"EVENT"]
].map(x=>({date:x[0],start:x[1],end:x[2],studio:x[3],performer:x[4],program:x[5],difficulty:x[6],status:x[7]}));

function stars(n){return n===0?"🔰":"★".repeat(n)+"☆".repeat(5-n)}
function bookingUrl(l){
 const m={
  GINZA:"https://b-monster.hacomono.jp/reserve/schedule/1/1/",
  OMOTESANDO:"https://b-monster.hacomono.jp/reserve/schedule/2/2",
  SHINJUKU:"https://b-monster.hacomono.jp/reserve/schedule/4/4",
  IKEBUKURO:"https://b-monster.hacomono.jp/reserve/schedule/5/5"
 };
 return m[l.studio];
}
function renderDates(){
 const bar=document.getElementById("datebar");bar.innerHTML="";
 dates.forEach(d=>{
  const b=document.createElement("button");
  b.className="datebtn"+(d===currentDate?" active":"");
  b.textContent=d;
  b.onclick=()=>{currentDate=d;renderDates();render()};
  bar.appendChild(b);
 });
}
function render(){
 const q=document.getElementById("q").value.toLowerCase();
 const data=lessons.filter(l=>l.date===currentDate).filter(l=>(l.performer+l.program+l.studio).toLowerCase().includes(q));
 const times=[...new Set(data.map(l=>l.start))].sort();
 const table=document.getElementById("table");table.innerHTML="";
 times.forEach(t=>{
  const tc=document.createElement("div");tc.className="time";tc.textContent=t;table.appendChild(tc);
  studios.forEach(s=>{
   const cell=document.createElement("div");cell.className="cell";
   const l=data.find(x=>x.start===t&&x.studio===s);
   if(!l){cell.innerHTML='<div class="card empty">—</div>'}
   else{
    const card=document.createElement("div");card.className="card";
    const badge=l.status==="FULL"?'<span class="badge full">FULL</span>':l.status==="EVENT"?'<span class="badge event">EVENT</span>':"";
    const program=l.status==="LITE"?'<span class="lite">Lite Program</span>':l.program+badge;
    card.innerHTML=`<div class="classTime">${l.start} - ${l.end}</div><div class="performer">${l.performer}</div><div class="program">${program}</div><div class="difficulty">難易度　${stars(l.difficulty)}</div>`;
    card.onclick=()=>{if(confirm(`${l.studio} ${l.start}-${l.end}\n${l.performer} / ${l.program}\n公式予約ページを開きますか？`)){window.open(bookingUrl(l),"_blank")}};
    cell.appendChild(card);
   }
   table.appendChild(cell);
  });
 });
}
document.getElementById("q").addEventListener("input",render);
renderDates();render();
</script>
</body>
</html>
